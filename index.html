<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Homegirl</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    font-family: Arial, sans-serif;
    overflow:hidden;
    position:relative;

    background:url("her.jpg") no-repeat center center/cover;
}

/* dark overlay */
body::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.45);
    z-index:0;
}

/* floating hearts */
.heart{
    position:absolute;
    bottom:-50px;
    font-size:20px;
    animation:floatUp 8s linear infinite;
}

@keyframes floatUp{
    0%{
        transform:translateY(0);
        opacity:0;
    }
    30%{opacity:1;}
    100%{
        transform:translateY(-110vh);
        opacity:0;
    }
}

/* particles */
.particle{
    position:absolute;
    width:4px;
    height:4px;
    background:white;
    border-radius:50%;
    opacity:0.6;
    animation:moveParticles 10s linear infinite;
}

@keyframes moveParticles{
    from{transform:translateY(100vh);}
    to{transform:translateY(-10vh);}
}

/* HOMEGIRL word */
.word{
    display:flex;
    z-index:2;
}

.word span{
    font-size:clamp(40px,6vw,70px);
    font-weight:bold;
    color:white;
    letter-spacing:8px;
    opacity:0;
    animation:fadeLetter 4s infinite;

    text-shadow:
        0 0 10px #fff,
        0 0 20px #ff6ec7,
        0 0 40px #ff6ec7;
}

/* letter delays */
.word span:nth-child(1){animation-delay:0s;}
.word span:nth-child(2){animation-delay:0.2s;}
.word span:nth-child(3){animation-delay:0.4s;}
.word span:nth-child(4){animation-delay:0.6s;}
.word span:nth-child(5){animation-delay:0.8s;}
.word span:nth-child(6){animation-delay:1s;}
.word span:nth-child(7){animation-delay:1.2s;}
.word span:nth-child(8){animation-delay:1.4s;}

@keyframes fadeLetter{
    0%{opacity:0;}
    40%{opacity:1;}
    60%{opacity:1;}
    100%{opacity:0;}
}

/* courtesy text */
.courtesy{
    position:absolute;
    bottom:30px;
    font-size:20px;
    color:white;
    z-index:2;
    text-shadow:0 0 10px rgba(0,0,0,0.7);
}

</style>
</head>

<body>

<div class="word">
<span>H</span>
<span>O</span>
<span>M</span>
<span>E</span>
<span>G</span>
<span>I</span>
<span>R</span>
<span>L</span>
</div>

<div class="courtesy">Courtesy: Peter</div>

<!-- hearts -->
<div class="heart" style="left:10%">❤️</div>
<div class="heart" style="left:30%; animation-delay:2s;">❤️</div>
<div class="heart" style="left:50%; animation-delay:4s;">❤️</div>
<div class="heart" style="left:70%; animation-delay:1s;">❤️</div>
<div class="heart" style="left:90%; animation-delay:3s;">❤️</div>

<!-- particles -->
<div class="particle" style="left:20%"></div>
<div class="particle" style="left:40%"></div>
<div class="particle" style="left:60%"></div>
<div class="particle" style="left:80%"></div>
<div class="particle" style="left:10%"></div>

</body>
</html>
